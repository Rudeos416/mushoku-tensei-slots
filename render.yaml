services:
  - type: web
    name: mushoku-tensei-slots
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mushoku-slots-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_TITLE
        value: Mushoku Tensei Slots
      - key: VITE_APP_ID
        value: mushoku-tensei-slots
      - key: OWNER_OPEN_ID
        value: ""
      - key: OWNER_NAME
        value: "Admin"
      - key: OAUTH_SERVER_URL
        value: ""
      - key: VITE_OAUTH_PORTAL_URL
        value: ""
      - key: BUILT_IN_FORGE_API_URL
        value: ""
      - key: BUILT_IN_FORGE_API_KEY
        value: ""
      - key: VITE_FRONTEND_FORGE_API_KEY
        value: ""
      - key: VITE_FRONTEND_FORGE_API_URL
        value: ""
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: VITE_PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_MODE
        value: sandbox

databases:
  - name: mushoku-slots-db
    databaseName: mushoku_slots
    plan: free
